<!DOCTYPE html>
<html>
<head>
  <title>Our Love Page ❤️</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to top, #000000, #1a001a);
      text-align: center;
      color: white;
      font-family: Arial;
    }

    h1 {
      margin-top: 20px;
      font-size: 40px;
    }

    img {
      width: 250px;
      height: 250px;
      border-radius: 20px;
      margin-top: 20px;
      box-shadow: 0 0 20px pink;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      background: pink;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .heart {
      position: absolute;
      color: red;
      font-size: 24px;
      animation: float 4s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-700px); opacity: 0; }
    }
  </style>
</head>
<body>

<h1>❤️ Our Beautiful Moments ❤️</h1>

<!-- ADD YOUR PHOTO HERE -->
<img src="WhatsApp Image 2026-03-28 at 2.40.34 PM.jpg" alt="Our Photo">

<br>

<button onclick="startLove()">Click for Surprise ❤️</button>

<!-- ADD YOUR SONG HERE -->
<iframe width="0" height="0"
src="https://www.youtube.com/watch?v=Wbs6pPJgBnA"
frameborder="0"
allow="autoplay">
</iframe>

  <button onclick="playMusic()">Click for Surprise ❤️</button>

<script>
function playMusic() {
  document.querySelector("iframe").src += "&mute=0";
}
</script>
<script>
  function startLove() {
    document.getElementById("music").play();
    setInterval(createHeart, 200);
  }

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 4000);
  }
</script>

</body>
</html>
